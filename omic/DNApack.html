<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Display</title>
    
    <style>
        /* This centers the image and makes it responsive so it looks good on any device */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Sets a clean white background */
        }
        
        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img src="https://eternath.github.io/en/omic/assets/DNApack.jpg" alt="DNA package image">

    </body>
</html>
