<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eterna | Coming Soon</title>
    <meta http-equiv="refresh" content="10;url=https://eternath.github.io/en/index.html">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fffdf5 0%, #fdf5d2 100%);
            font-family: 'Playfair Display', serif;
            color: #4a3f28;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 40px;
        }

        /* ข้อความหลักที่เน้น */
        .main-quote {
            font-size: 2.5rem;
            line-height: 1.4;
            margin-bottom: 2.5rem;
            font-weight: 400;
            color: #3a3321;
        }

        .main-quote span {
            font-weight: 600;
            color: #b8860b; /* สีทองสำหรับชื่อแบรนด์ */
        }

        /* ข้อความแจ้งเตือนขนาดเล็ก */
        .sub-text {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #8c7d55;
            margin-bottom: 0.5rem;
        }

        .redirect-note {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* Minimal Loading Line */
        .loader-line {
            margin: 30px auto 0;
            width: 60px;
            height: 1px;
            background: rgba(184, 134, 11, 0.3);
            position: relative;
            overflow: hidden;
        }

        .loader-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #b8860b;
            animation: slide 10s linear forwards;
        }

        @keyframes slide {
            0% { left: -100%; }
            100% { left: 0%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-quote">
            <span>At Eterna,</span> Personalized by Science. <br>Proven by Evidence. <br>Filtered for Truth.
        </div>

        <div class="sub-text">
            The page is under development
        </div>
        
        <div class="loader-line"></div>
    </div>

</body>
</html>
