<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Development</title>
    <meta http-equiv="refresh" content="5;url=https://eternath.github.io/en/index.html">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Minimalist Golden Gradient */
            background: radial-gradient(circle, #fff9e6 0%, #f7e1a0 100%);
            font-family: 'Playfair Display', serif;
            color: #5c4b2a;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            opacity: 0.8;
        }

        .loader {
            margin-top: 20px;
            height: 2px;
            width: 100px;
            background-color: rgba(92, 75, 42, 0.2);
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            width: 100%;
            height: 100%;
            background: #b8860b;
            position: absolute;
            left: -100%;
            animation: loading 5s linear forwards;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 0%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The page is under development</h1>
        <p>This will redirect to the home page within 5 seconds.</p>
        <div class="loader"></div>
    </div>

</body>
</html>
